name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Get tag info
      id: tag
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "version_no_v=${VERSION#v}" >> $GITHUB_OUTPUT
    
    - name: Create Release Notes
      id: release_notes
      run: |
        cat > /tmp/release_notes.md << 'EOF'
        # TradeAdviser ${{ steps.tag.outputs.version }}
        
        ## What's New
        
        ### Features
        - New features introduced in this release
        
        ### Improvements
        - Performance improvements
        - Bug fixes
        
        ### Documentation
        - Updated documentation
        
        ## Installation
        
        ### Docker
        ```bash
        docker pull tradeadviser-backend:${{ steps.tag.outputs.version }}
        docker pull tradeadviser-frontend:${{ steps.tag.outputs.version }}
        ```
        
        ### From Source
        ```bash
        git clone https://github.com/yourusername/tradeadviser.git
        cd tradeadviser
        git checkout ${{ steps.tag.outputs.version }}
        ```
        
        See [SETUP.md](https://github.com/yourusername/tradeadviser/blob/master/SETUP.md) for detailed installation instructions.
        
        ## Security
        
        Please review the [Security](https://github.com/yourusername/tradeadviser/security) page.
        
        ## Contributors
        
        Thank you to all contributors to this release!
        
        EOF
        echo "release_notes=$(cat /tmp/release_notes.md)" >> $GITHUB_OUTPUT
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag.outputs.version }}
        name: TradeAdviser ${{ steps.tag.outputs.version }}
        body: ${{ steps.release_notes.outputs.release_notes }}
        draft: false
        prerelease: ${{ contains(steps.tag.outputs.version, 'alpha') || contains(steps.tag.outputs.version, 'beta') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-artifacts:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: tradeadviser-backend-linux
          - os: macos-latest
            artifact_name: tradeadviser-backend-macos
          - os: windows-latest
            artifact_name: tradeadviser-backend-windows.exe
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Build backend
      working-directory: ./backend
      run: |
        pip install -r requirements.txt
        pip install pyinstaller
        pyinstaller --onefile main.py --name tradeadviser-backend
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.artifact_name }}
        path: backend/dist/tradeadviser-backend*

  publish-docker:
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Extract version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
    
    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/tradeadviser-backend:${{ steps.version.outputs.version }}
          ${{ secrets.DOCKER_USERNAME }}/tradeadviser-backend:latest
    
    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./server
        file: ./server/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/tradeadviser-frontend:${{ steps.version.outputs.version }}
          ${{ secrets.DOCKER_USERNAME }}/tradeadviser-frontend:latest

  publish-pypi:
    runs-on: ubuntu-latest
    needs: create-release
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install build tools
      run: |
        pip install build twine
    
    - name: Build backend package
      working-directory: ./backend
      run: python -m build
    
    - name: Publish backend to PyPI
      working-directory: ./backend
      run: |
        python -m twine upload dist/* \
          --username __token__ \
          --password ${{ secrets.PYPI_TOKEN }} \
          --skip-existing
    
    - name: Build desktop package
      working-directory: ./desktop
      run: python -m build
    
    - name: Publish desktop to PyPI
      working-directory: ./desktop
      run: |
        python -m twine upload dist/* \
          --username __token__ \
          --password ${{ secrets.PYPI_TOKEN }} \
          --skip-existing

  notify-slack:
    runs-on: ubuntu-latest
    needs: [ publish-docker, publish-pypi ]
    if: always()
    
    steps:
    - name: Notify Slack
      uses: slackapi/slack-github-action@v1
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK }}
        payload: |
          {
            "text": "🚀 TradeAdviser Release Published",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "**TradeAdviser ${{ github.ref_name }}** has been released!\n\n📦 Docker images pushed\n📝 PyPI packages published\n🔗 <https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}|View Release>"
                }
              }
            ]
          }
