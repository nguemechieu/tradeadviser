name: Security Scan

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master,  dev ]
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM UTC

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run GitGuardian
      uses: gitguardian/ggshield-action@master
      with:
        api-key: ${{ secrets.GITGUARDIAN_API_KEY }}
        githubtoken: ${{ secrets.GITHUB_TOKEN }}
        scanning-args: --all-commits

  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Snyk
      uses: snyk/actions/setup@master
    
    - name: Snyk Test Backend
      working-directory: ./backend
      run: |
        snyk test \
          --severity-threshold=high \
          --file=requirements.txt \
          --json-file-output=snyk-results.json || true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    
    - name: Snyk Test Frontend
      working-directory: ./server/frontend
      run: |
        snyk test \
          --severity-threshold=high \
          --file=package.json \
          --json-file-output=snyk-results.json || true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    
    - name: Snyk Test Desktop
      working-directory: ./desktop
      run: |
        snyk test \
          --severity-threshold=high \
          --file=requirements.txt \
          --json-file-output=snyk-results.json || true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  container-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
    
    - name: Upload Trivy SARIF
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
        category: 'trivy'

  sast:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: 'python, javascript'
    
    - name: Autobuild
      uses: github/codeql-action/autobuild@v2
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

  bandit-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Run Bandit on Backend
      run: |
        pip install bandit
        bandit -r backend/src backend/api -f json -o bandit-results.json || true
    
    - name: Run Bandit on Desktop
      run: |
        bandit -r desktop/src -f json -o bandit-results.json || true
    
    - name: Upload results
      uses: actions/upload-artifact@v3
      with:
        name: bandit-results
        path: bandit-results.json

  license-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check licenses
      uses: fossas/fossa-action@main
      with:
        api-key: ${{ secrets.FOSSA_API_KEY }}
        branch: ${{ github.ref_name }}

  create-security-report:
    if: always()
    runs-on: ubuntu-latest
    needs: [ secret-scan, dependency-check, container-scan, sast, bandit-scan, license-check ]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Create security summary
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          let summary = '# Security Scan Report\n\n';
          summary += `- **Date**: ${new Date().toISOString()}\n`;
          summary += `- **Commit**: ${{ github.sha }}\n`;
          summary += `- **Branch**: ${{ github.ref_name }}\n\n`;
          
          summary += '## Scan Results\n';
          summary += `- Secret Scanning: ${{ needs.secret-scan.result }}\n`;
          summary += `- Dependency Check: ${{ needs.dependency-check.result }}\n`;
          summary += `- Container Scan: ${{ needs.container-scan.result }}\n`;
          summary += `- SAST: ${{ needs.sast.result }}\n`;
          summary += `- Bandit: ${{ needs.bandit-scan.result }}\n`;
          summary += `- License Check: ${{ needs.license-check.result }}\n`;
          
          fs.writeFileSync('SECURITY_REPORT.md', summary);
          core.notice(summary);
    
    - name: Upload report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: SECURITY_REPORT.md
