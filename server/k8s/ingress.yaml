apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tradeadviser
  namespace: tradeadviser
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "10m"
spec:
  tls:
  - hosts:
    - tradeadviser.org
    - www.tradeadviser.org
    secretName: tradeadviser-tls
  rules:
  - host: tradeadviser.org
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: tradeadviser-backend
            port:
              number: 8000
      - path: /docs
        pathType: Prefix
        backend:
          service:
            name: tradeadviser-backend
            port:
              number: 8000
      - path: /redoc
        pathType: Prefix
        backend:
          service:
            name: tradeadviser-backend
            port:
              number: 8000
      - path: /openapi.json
        pathType: Prefix
        backend:
          service:
            name: tradeadviser-backend
            port:
              number: 8000
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: tradeadviser-backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tradeadviser-frontend
            port:
              number: 80
  - host: www.tradeadviser.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tradeadviser-frontend
            port:
              number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-ingress-controller
  namespace: ingress-nginx
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: ingress-nginx
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  - name: https
    port: 443
    targetPort: 443
    protocol: TCP
