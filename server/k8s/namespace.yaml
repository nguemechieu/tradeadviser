apiVersion: v1
kind: Namespace
metadata:
  name: tradeadviser
  labels:
    app: tradeadviser
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tradeadviser-config
  namespace: tradeadviser
data:
  LOG_LEVEL: "INFO"
  DEBUG: "false"
  ENVIRONMENT: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: tradeadviser-secrets
  namespace: tradeadviser
type: Opaque
stringData:
  # Update these with your actual secrets
  DATABASE_URL: "postgresql://user:password@postgres:5432/tradeadviser"
  SECRET_KEY: "your-secret-key-here"
  JWT_SECRET: "your-jwt-secret-here"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: tradeadviser
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
