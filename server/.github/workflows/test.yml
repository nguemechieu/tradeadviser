name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: tradeadviser_test
          POSTGRES_USER: tradeadviser
          POSTGRES_PASSWORD: tradeadviser
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio

    - name: Lint with flake8
      working-directory: ./backend
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Type checking with mypy
      working-directory: ./backend
      run: |
        pip install mypy
        mypy . --ignore-missing-imports || true

    - name: Run backend tests
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://tradeadviser:tradeadviser@localhost:5432/tradeadviser_test
      run: |
        pytest tests/ -v --cov=app --cov-report=xml --cov-report=html --cov-report=json

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Lint with ESLint
      working-directory: ./frontend
      run: |
        npx eslint src/ --max-warnings 0 || true

    - name: Format check with Prettier
      working-directory: ./frontend
      run: |
        npx prettier --check src/ || true

    - name: Run frontend tests
      working-directory: ./frontend
      run: |
        npm test -- --coverage --passWithNoTests --collectCoverageFrom="src/**/*.{js,jsx}" --coveragePathIgnorePatterns="/node_modules/,/build/"

    - name: Upload frontend coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./frontend/coverage/coverage-final.json
        flags: frontend
        name: frontend-coverage
        fail_ci_if_error: false

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

  security-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run Bandit security check
      run: |
        pip install bandit
        bandit -r backend/ -f json -o bandit-report.json || true

test-status:
  runs-on: ubuntu-latest
  needs: [backend-tests, frontend-tests, security-scan]
  if: always()
  
  steps:
  - name: Check test results
    run: |
      if [[ "${{ needs.backend-tests.result }}" == "failure" ]] || \
         [[ "${{ needs.frontend-tests.result }}" == "failure" ]]; then
        echo "Tests failed"
        exit 1
      fi
      echo "All tests passed!"
