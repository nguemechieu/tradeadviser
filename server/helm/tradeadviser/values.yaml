# Default values for TradeAdviser Helm chart
replicaCount:
  backend: 2
  frontend: 2

image:
  registry: ghcr.io
  repository: sopotek/tradeadviser
  tag: latest
  pullPolicy: IfNotPresent

backend:
  name: tradeadviser-backend
  replicaCount: 2
  port: 8000
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

frontend:
  name: tradeadviser-frontend
  replicaCount: 2
  port: 80
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

database:
  type: postgresql
  name: postgres
  port: 5432
  persistence:
    enabled: true
    size: 10Gi
    storageClass: standard
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: tradeadviser.org
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: tradeadviser-tls
      hosts:
        - tradeadviser.org

namespace:
  create: true
  name: tradeadviser

config:
  logLevel: "INFO"
  debug: false
  environment: "production"

secrets:
  create: true
  # These should be provided at deployment time
  # databaseUrl: ""
  # secretKey: ""
  # jwtSecret: ""

podDisruptionBudget:
  backend:
    enabled: true
    minAvailable: 1
  frontend:
    enabled: true
    minAvailable: 1

securityContext:
  runAsNonRoot: true
  fsGroup: 1000

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - tradeadviser
          topologyKey: kubernetes.io/hostname

monitoring:
  enabled: false
  prometheus:
    enabled: false
  datadog:
    enabled: false
