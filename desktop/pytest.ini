[pytest]
testpaths = src/tests
addopts = -ra --strict-markers --import-mode=importlib -p no:cacheprovider
norecursedirs =
    .codex-tmp
    .git
    .github
    .idea
    .mypy_cache
    .pytest_cache
    .venv
    .vscode
    .deps
    .deps_legacy
    .deps_ui
    build
    dist
    htmlcov
    output
    tmp
markers =
    unit: Fast, isolated tests.
    integration: Cross-module or service integration tests.
    slow: Longer-running or resource-intensive tests.
