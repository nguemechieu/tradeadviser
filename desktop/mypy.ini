[mypy]
python_version = 3.10
pretty = True
show_error_codes = True
warn_unused_configs = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_no_return = True
ignore_missing_imports = True
disable_error_code = import-untyped
exclude = (?x)(^src/(assets|logs|reports)/|^src/sopotek_quant_system\.egg-info/)

[mypy-qasync]
ignore_missing_imports = True

[mypy-PySide6]
ignore_missing_imports = True

[mypy-PySide6.*]
ignore_missing_imports = True

[mypy-pandas]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-ta]
ignore_missing_imports = True

[mypy-ta.*]
ignore_missing_imports = True
