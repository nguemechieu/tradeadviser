version: 1

formatters:
  simple:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

handlers:

  console:
    class: logging.StreamHandler
    formatter: simple
    level: INFO

  file:
    class: logging.FileHandler
    formatter: simple
    filename: logs/system.log
    level: INFO

loggers:

  sopotek_trading:
    handlers: [ console, file ]
    level: INFO
    propagate: no

root:
  handlers: [ console ]
  level: INFO